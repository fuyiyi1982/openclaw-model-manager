<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - OpenClaw 控制面板</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h1>OpenClaw 控制面板</h1>
            <form id="loginForm">
                <div class="form-group">
                    <label for="password">管理员密码</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="请输入密码">
                </div>
                <div id="errorMsg" class="mb-3" style="color: var(--danger-color); display: none;"></div>
                <button type="submit" class="btn btn-block">登录</button>
            </form>
        </div>
    </div>

    <script src="/login.js"></script>
</body>
</html>
