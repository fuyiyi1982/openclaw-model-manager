<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw 控制面板</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="nav-brand">OpenClaw 控制面板</a>
        <div class="nav-links">
            <a href="/">模型管理</a>
            <a href="/settings">设置</a>
            <a href="#" id="logoutBtn">退出登录</a>
        </div>
    </nav>

    <div class="container">
        <!-- Service Status Section -->
        <div class="card">
            <div class="card-header">
                <div class="card-title">服务状态</div>
                <div class="actions-cell">
                    <button id="restartBtn" class="btn">重启服务</button>
                    <button id="stopBtn" class="btn btn-danger">停止服务</button>
                </div>
            </div>
            <div class="flex-row" style="align-items: center;">
                <span id="statusIndicator" class="status-indicator"></span>
                <span id="statusText">正在检查...</span>
            </div>
            <div id="terminalOutput" class="terminal-output" style="display: none;"></div>
        </div>

        <!-- Active Model Selection -->
        <div class="card">
            <div class="card-header">
                <div class="card-title">默认模型</div>
                <button id="saveActiveModelBtn" class="btn">保存</button>
            </div>
            <div class="form-group">
                <label for="activeModelSelect">当前使用的主模型</label>
                <select id="activeModelSelect">
                    <!-- Options populated via JS -->
                </select>
            </div>
        </div>

        <!-- Providers and Models -->
        <div class="card">
            <div class="card-header">
                <div class="card-title">模型渠道配置</div>
                <button id="addProviderBtn" class="btn">添加渠道</button>
            </div>
            <div id="providersList">
                <!-- Providers populated via JS -->
            </div>
        </div>
    </div>

    <!-- Add Provider Modal -->
    <div id="providerModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="providerModalTitle">添加渠道</h3>
                <button class="close-btn" data-modal="providerModal">&times;</button>
            </div>
            <form id="providerForm">
                <input type="hidden" id="editOldProviderName">
                <div class="form-group">
                    <label for="providerName">渠道名称 (唯一标识)</label>
                    <input type="text" id="providerName" required maxlength="64" pattern="[A-Za-z0-9][A-Za-z0-9._-]{0,63}" placeholder="例如: custom-bot">
                </div>
                <div class="form-group">
                    <label for="providerBaseUrl">Base URL</label>
                    <input type="url" id="providerBaseUrl" required placeholder="https://api.example.com/v1">
                </div>
                <div class="form-group">
                    <label for="providerApiKey">API Key</label>
                    <input type="password" id="providerApiKey" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="providerApiType">API 类型</label>
                    <select id="providerApiType" required>
                        <option value="openai-completions">OpenAI 格式 (openai-completions)</option>
                        <option value="openai-responses">OpenAI Responses (openai-responses)</option>
                        <option value="anthropic-messages">Anthropic 格式 (anthropic-messages)</option>
                    </select>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary close-btn-action" data-modal="providerModal">取消</button>
                    <button type="submit" class="btn">保存</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Add Model Modal -->
    <div id="modelModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modelModalTitle">添加模型</h3>
                <button class="close-btn" data-modal="modelModal">&times;</button>
            </div>
            <form id="modelForm">
                <input type="hidden" id="modelProviderName">
                <input type="hidden" id="editOldModelId">
                <div class="form-group">
                    <label for="modelId">模型 ID</label>
                    <input type="text" id="modelId" required maxlength="128" placeholder="例如: gpt-4o">
                </div>
                <div class="form-group">
                    <label for="modelName">显示名称</label>
                    <input type="text" id="modelName" placeholder="例如: GPT-4o (可选)">
                </div>
                <div class="form-group">
                    <label for="modelContextWindow">上下文窗口</label>
                    <input type="number" id="modelContextWindow" value="128000" min="1" step="1">
                </div>
                <div class="form-group">
                    <label for="modelMaxTokens">最大输出 Token</label>
                    <input type="number" id="modelMaxTokens" value="4096" min="1" step="1">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary close-btn-action" data-modal="modelModal">取消</button>
                    <button type="submit" class="btn">保存</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/app.js"></script>
<div style="text-align: center; padding: 20px; color: var(--text-muted); font-size: 14px;">Powered by <a href="https://github.com/fuyiyi1982/openclaw-model-manager" target="_blank" style="color: var(--primary-color); text-decoration: none;">fuyiyi1982/openclaw-model-manager</a></div>
</body>
</html>
