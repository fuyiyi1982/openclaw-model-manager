<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设置 - OpenClaw 控制面板</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="nav-brand">OpenClaw 控制面板</a>
        <div class="nav-links">
            <a href="/">模型管理</a>
            <a href="/settings">设置</a>
            <a href="#" id="logoutBtn">退出登录</a>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <div class="card-header">
                <div class="card-title">修改密码</div>
            </div>
            <form id="passwordForm">
                <div class="form-group">
                    <label for="currentPassword">当前密码</label>
                    <input type="password" id="currentPassword" required autocomplete="current-password">
                </div>
                <div class="form-group">
                    <label for="newPassword">新密码</label>
                    <input type="password" id="newPassword" required minlength="8" autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label for="confirmPassword">确认新密码</label>
                    <input type="password" id="confirmPassword" required minlength="8" autocomplete="new-password">
                </div>
                <div id="msg" class="mb-3" style="display: none;"></div>
                <button type="submit" class="btn">保存修改</button>
            </form>
        </div>
    </div>

    <script src="/app.js"></script>
    <script src="/settings.js"></script>
<div style="text-align: center; padding: 20px; color: var(--text-muted); font-size: 14px;">Powered by <a href="https://github.com/fuyiyi1982/openclaw-model-manager" target="_blank" style="color: var(--primary-color); text-decoration: none;">fuyiyi1982/openclaw-model-manager</a></div>
</body>
</html>
